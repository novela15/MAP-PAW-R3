<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sidebar Menu</title>
    <link rel="stylesheet" href="D:\Kuliah Sem4\Prak. Aplikasi Web\Projek MAP\view\css\sidebar_style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>

<body>
<div class="sidebar">
    <div class="sidebar-header">
        <button class="sidebar-icon-button">
            <i class="fa-solid fa-bars"></i>
        </button>
    </div>

    <div class="sidebar-label">Menu</div>

    <div id="nav-group">
        <button class="sidebar-button">Buku Anggaran</button>
        <button class="sidebar-button">Kategori Anggaran</button>
        <button class="sidebar-button">Akun Anggaran</button>
        <button class="sidebar-button">Catat Belanja</button>

        <!-- Dropdown Laporan -->
        <div class="dropdown">
            <button class="sidebar-button dropdown-btn" onclick="toggleDropdown()">
                Laporan
                <i class="fa-solid fa-chevron-down"></i>
            </button>

            <div class="dropdown-content" id="laporanMenu">
                <button class="submenu-button">Jurnal Umum</button>
                <button class="submenu-button">Buku Besar</button>
                <button class="submenu-button">Laporan Realisasi</button>
            </div>
        </div>

        <button class="sidebar-button">Tutup Buku</button>
    </div>

    <button class="sidebar-button logout-btn">Keluar</button>
</div>

<script src="D:\Kuliah Sem4\Prak. Aplikasi Web\Projek MAP\view\js\sidebar_js.js"></script>
</body>
</html>
