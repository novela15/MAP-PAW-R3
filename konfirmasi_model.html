<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Konfirmasi</title>
</head>
<body>

<div class="container">
   <!-- KONFIRMASI UBAH -->
    <div class="confirm-wrapper">
        <div class="confirm-card">
            <div class="confirm-header">KONFIRMASI</div>

            <div class="confirm-body">
                <div class="icon">!</div>
                <p>Apakah Anda Yakin?</p>
            </div>

            <div class="button-group">
                <button class="btn-cancel">BATAL</button>
                <button class="btn-yes">IYA</button>
            </div>
       </div>
    </div>
</div>

</body>
</html>
