<!DOCTYPE html>

<head>
    <link rel="stylesheet" href="signup.css">
</head>

<body>
    <div class="signup-container">
        <p class="header">Sign Up</p>
        <div class="input-container">
            <p class="input-label">Username</p>
            <input id="username" class="value" type="text" placeholder="Username" autocomplete="off">
            <p class="input-label">Email</p>
            <input id="email" class="value" type="email" placeholder="Email" autocomplete="off">
            <p class="input-label">Password</p>
            <input id="password" class="value" type="password" placeholder="Password">
            <p class="input-label">Confirm Password</p>
            <input id="confirm" class="value" type="password" placeholder="Confirm Password">
        </div>
        <div class="input-container button-container">
            <button class="signup">Sign Up</button>
            <div>or</div>
            <button class="signup">Sign up with<img src="https://www.google.com/favicon.ico" loading="lazy"></button>
        </div>
    </div>
        <script src="signup.js"></script>
</body>
