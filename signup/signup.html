<!DOCTYPE html>

<head>
    <link rel="stylesheet" href="signup.css">
</head>

<body>
    <div class="signup-block">
        <p class="header">Sign Up</p>
        <div class="input-block">
            <p class="title">Username</p>
            <input class="value" type="text" placeholder="Username">
            <p class="title">Email</p>
            <input class="value" type="text" placeholder="Email">
            <p class="title">Password</p>
            <input class="value" type="text" placeholder="Password">
            <p class="title">Confirm Password</p>
            <input class="value" type="text" placeholder="Confirm Password">
        </div>
        <div class="input-block button-container">
            <button>Sign Up</button>
            <p>or</p>
        </div>
    </div>
</body>
