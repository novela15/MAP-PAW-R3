<!DOCTYPE html>

<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="registration.css">
    </head>

    <body>
        <div class="registration-container">
            <p class="header">Sign Up</p>
            <div class="input-container">
                <p class="input-label">Username</p>
                <input class="value" type="text" placeholder="Username" autocomplete="off">
                <p class="input-label">Email</p>
                <input class="value" type="email" placeholder="Email" autocomplete="off">
                <p class="input-label">Password</p>
                <input class="value" type="password" placeholder="Password">
                <p class="input-label">Confirm Password</p>
                <input class="value" type="password" placeholder="Confirm Password">
            </div>
            <div class="input-container button-container">
                <button class="signup">Sign Up</button>
                <div>or</div>
                <button class="signup">Sign up with<img src="https://www.google.com/favicon.ico" loading="lazy"></button>
            </div>
            <div class="sign-in-link">
                <a href="login.html">Have an account? Sign in.</a>
            </div>
        </div>
    </body>
</html>
