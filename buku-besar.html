<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan - Buku Besar</title>
    <link rel="stylesheet" href="../skeleton.css">
    <link rel="stylesheet" href="buku-besar.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <button class="sidebar-icon-button"><i class="fas fa-bars"></i></button>
            <button class="sidebar-icon-button"><i class="fas fa-plus-circle"></i></button>
        </div>
        <div class="sidebar-search-container">
            <input type="text" placeholder="Search" class="sidebar-search">
            <button class="sidebar-search-button"><i class="fas fa-search"></i></button>
        </div>
        <div class="sidebar-label">Menu</div>
        <button class="sidebar-button">Buku Anggaran</button>
        <button class="sidebar-button">Kategori Anggaran</button>
        <button class="sidebar-button">Akun Anggaran</button>
        <button class="sidebar-button">Catat Belanja</button>
        <button class="sidebar-button selected-sidebar-button has-submenu">
            Laporan
            <i class="fas fa-chevron-right submenu-icon"></i>
        </button>
        <div class="submenu">
            <button class="sidebar-button">Jurnal Umum</button>
            <button class="sidebar-button selected-sidebar-button">Buku Besar</button>
            <button class="sidebar-button">Realisasi Anggaran</button>
        </div>
        <button class="sidebar-button">Tutup Buku</button>
        <button class="sidebar-button">Keluar</button>
    </div>
    
    <div class="container">
        <p class="container-header">Laporan</p>
        <div class="subcontainer">
            <div class="horizontal-flex">
                <p class="container-header">Buku Besar</p>
                <div class="search-container">
                    <input type="text" placeholder="Cari Kategori" class="category-search">
                    <button class="search-button"><i class="fas fa-search"></i></button>
                </div>
            </div>
            
            <div class="category-grid">
                <div class="category-card card-gradient-1">
                    <span class="category-name">Nama<br>Kategori</span>
                </div>
                <div class="category-card card-gradient-2">
                    <span class="category-name">Nama<br>Kategori</span>
                </div>
                <div class="category-card card-gradient-3">
                    <span class="category-name">Nama<br>Kategori</span>
                </div>
                <div class="category-card card-gradient-3">
                    <span class="category-name">Nama<br>Kategori</span>
                </div>
                <div class="category-card card-gradient-1">
                    <span class="category-name">Nama<br>Kategori</span>
                </div>
                <div class="category-card card-gradient-2">
                    <span class="category-name">Nama<br>Kategori</span>
            </div>
        </div>
    </div>
</body>
</html>
