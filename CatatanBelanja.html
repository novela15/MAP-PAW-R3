<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catat Belanja - KostCare</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Custom Colors based on your data */
        :root {
            --sidebar-color: #90C1BE;
            --bg-page: #C2E1DF;
            --btn-action: #668685;
            --btn-trash: #CF3234;
            --table-header: #477B79; /* Diambil dari 3 menu dashboard buku */
        }
        body { background-color: var(--bg-page); }
        .sidebar { background-color: var(--sidebar-color); }
        .btn-buat { background-color: var(--btn-action); }
        .btn-edit { background-color: var(--btn-action); }
        .btn-trash { background-color: var(--btn-trash); }
        .table-header { background-color: var(--table-header); }
    </style>
</head>
<body class="flex h-screen font-sans text-gray-700">

    <aside class="sidebar w-64 flex flex-col p-4 shadow-lg">
        <div class="flex items-center mb-6 gap-3">
            <i class="fa-solid fa-bars text-xl cursor-pointer"></i>
            <i class="fa-solid fa-circle-plus text-xl cursor-pointer"></i>
        </div>

        <div class="relative mb-6">
            <input type="text" placeholder="Search" class="w-full pl-3 pr-10 py-1 rounded-full border-none focus:ring-2 focus:ring-[#477B79] outline-none text-sm">
            <i class="fa-solid fa-magnifying-glass absolute right-3 top-2 text-gray-400 text-xs"></i>
        </div>

        <nav class="space-y-1 text-sm">
            <p class="text-xs font-semibold text-gray-600 mb-2">Menu</p>
            <a href="#" class="block py-2 px-2 hover:bg-white/20 rounded">Buku Anggaran</a>
            <a href="#" class="block py-2 px-2 hover:bg-white/20 rounded">Kategori Anggaran</a>
            <a href="#" class="block py-2 px-2 hover:bg-white/20 rounded">Akun Anggaran</a>
            <a href="#" class="block py-2 px-2 bg-white rounded shadow-sm font-bold">Catat Belanja</a>
            <a href="#" class="block py-2 px-2 hover:bg-white/20 rounded">Laporan</a>
            <a href="#" class="block py-2 px-2 hover:bg-white/20 rounded">Tutup Buku</a>
            <a href="#" class="block py-2 px-2 mt-4 hover:bg-white/20 rounded">Keluar</a>
        </nav>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        <h1 class="text-2xl font-bold mb-6">Catat Belanja</h1>

        <div class="bg-white/50 rounded-2xl p-6 shadow-sm min-h-[500px] relative">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold">Daftar Belanja</h2>
                <button class="btn-buat text-white px-4 py-1 rounded flex items-center gap-2 text-sm shadow-md hover:opacity-90">
                    <i class="fa-solid fa-plus"></i> Buat
                </button>
            </div>

            <div class="overflow-x-auto rounded-lg border border-gray-300">
                <table class="w-full text-left border-collapse bg-white">
                    <thead>
                        <tr class="table-header text-white text-center text-xs uppercase tracking-wider">
                            <th class="py-3 px-2 border-r border-white/20">Tanggal</th>
                            <th class="py-3 px-2 border-r border-white/20">Akun Anggaran</th>
                            <th class="py-3 px-2 border-r border-white/20">Volume</th>
                            <th class="py-3 px-2 border-r border-white/20">Satuan</th>
                            <th class="py-3 px-2 border-r border-white/20">Jumlah Total</th>
                            <th class="py-3 px-2 border-r border-white/20">Keterangan</th>
                            <th class="py-3 px-2 border-r border-white/20">Bukti Pengeluaran</th>
                            <th class="py-3 px-2">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <script>
                            for (let i = 0; i < 4; i++) {
                                document.write(`
                                    <tr class="border-b border-gray-300 h-10">
                                        <td class="border-r border-gray-300"></td>
                                        <td class="border-r border-gray-300"></td>
                                        <td class="border-r border-gray-300"></td>
                                        <td class="border-r border-gray-300"></td>
                                        <td class="border-r border-gray-300"></td>
                                        <td class="border-r border-gray-300"></td>
                                        <td class="border-r border-gray-300"></td>
                                        <td class="flex justify-center gap-2 py-2">
                                            <button class="btn-trash text-white w-7 h-7 rounded flex items-center justify-center shadow-sm"><i class="fa-solid fa-trash-can text-xs"></i></button>
                                            <button class="btn-edit text-white w-7 h-7 rounded flex items-center justify-center shadow-sm"><i class="fa-solid fa-pencil text-xs"></i></button>
                                        </td>
                                    </tr>
                                `);
                            }
                        </script>
                    </tbody>
                </table>
            </div>

            <div class="absolute bottom-6 right-6 flex gap-3">
                <button class="btn-trash text-white w-10 h-10 rounded-lg flex items-center justify-center shadow-lg hover:scale-105 transition-transform">
                    <i class="fa-solid fa-trash-can text-lg"></i>
                </button>
                <button class="btn-edit text-white w-10 h-10 rounded-lg flex items-center justify-center shadow-lg hover:scale-105 transition-transform">
                    <i class="fa-solid fa-pencil text-lg"></i>
                </button>
            </div>
        </div>
    </main>

</body>
</html>
